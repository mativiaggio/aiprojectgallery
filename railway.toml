[build]
builder = "RAILPACK"
buildCommand = "pnpm build"
watchPatterns = [
  "src/**",
  "public/**",
  "drizzle/**",
  "scripts/**",
  "package.json",
  "pnpm-lock.yaml",
  "next.config.ts",
  "drizzle.config.ts",
  "tsconfig.json",
  "postcss.config.mjs",
  "components.json"
]

[deploy]
runtime = "V2"
numReplicas = 1
sleepApplication = false
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/api/health"
healthcheckTimeout = 60
preDeployCommand = "pnpm db:generate && pnpm db:migrate"
startCommand = "HOSTNAME=0.0.0.0 node .next/standalone/server.js"
