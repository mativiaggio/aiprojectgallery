[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "src/**",
  "public/**",
  "drizzle/**",
  "scripts/**",
  "package.json",
  "pnpm-lock.yaml",
  "next.config.ts",
  "drizzle.config.ts",
  "tsconfig.json",
  "postcss.config.mjs",
  "components.json"
]

[deploy]
runtime = "V2"
numReplicas = 1
sleepApplication = true
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckTimeout = 60
preDeployCommand = "pnpm db:generate && pnpm db:migrate"
startCommand = "pnpm exec next start -H 0.0.0.0 -p $PORT"
